name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - 'src/**'
      - '.github/workflows/gcp-cloud-run.yml'
      - 'requirements.txt'
      - 'CLOUD_DEPLOYMENT.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          quiet: true

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT_ID }}/studybuddy:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT_ID }}/studybuddy:${{ github.sha }}
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars CHROMA_PERSIST_DIRECTORY=/tmp/chroma,CHROMA_COLLECTION_NAME=studybuddy,EMBEDDING_MODEL_NAME=all-MiniLM-L6-v2,EMBEDDING_DEVICE=cpu
