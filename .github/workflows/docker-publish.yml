name: Publish Docker image

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'src/**'
      - '.github/workflows/docker-publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          password: ${{ secrets.GITHUB_TOKEN }}
          username: ${{ github.actor }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/studybuddy:latest
            ghcr.io/${{ github.repository_owner }}/studybuddy:${{ github.sha }}
          file: Dockerfile
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/studybuddy:latest
          cache-to: type=inline
