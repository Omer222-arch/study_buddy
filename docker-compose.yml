version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CHROMA_PERSIST_DIRECTORY=/app/db/chroma
      - CHROMA_COLLECTION_NAME=studybuddy
      - EMBEDDING_MODEL_NAME=all-MiniLM-L6-v2
      - EMBEDDING_DEVICE=cpu

  ui:
    build: .
    command: ["streamlit", "run", "src/streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - STUDY_BUDDY_API_URL=http://api:8000
    volumes:
      - .:/app
      - ./db:/app/db
